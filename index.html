<!DOCTYPE html>
<html>
  <head>
    <title>Street Gallery Map</title>
    <meta charset="utf-8" />
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      // =========================
      // 1. SNAZZY MAP STYLE
      // =========================
      const mapStyle = [
        {
          featureType: "landscape",
          elementType: "all",
          stylers: [
            { hue: "#6600ff" },
            { saturation: -16 },
            { visibility: "on" }
          ]
        },
        {
          featureType: "landscape.man_made",
          elementType: "all",
          stylers: [
            { visibility: "on" },
            { saturation: 0 },
            { gamma: 0.7 }
          ]
        },
        {
          featureType: "poi",
          elementType: "all",
          stylers: [
            { saturation: 27 },
            { hue: "#3200ff" },
            { lightness: 3 },
            { visibility: "off" }
          ]
        },
        {
          featureType: "road",
          elementType: "all",
          stylers: [
            { hue: "#6600ff" },
            { saturation: -57 },
            { lightness: -28 }
          ]
        },
        {
          featureType: "road.local",
          elementType: "all",
          stylers: [
            { lightness: -45 },
            { weight: 1.3 },
            { color: "#6600ff" },
            { saturation: -57 },
            { gamma: 2.35 }
          ]
        },
        {
          featureType: "transit",
          elementType: "all",
          stylers: [
            { visibility: "simplified" },
            { hue: "#5e00ff" },
            { saturation: -16 }
          ]
        },
        {
          featureType: "water",
          elementType: "all",
          stylers: [
            { saturation: -65 },
            { hue: "#1900ff" },
            { lightness: 8 }
          ]
        }
      ];

      // =========================
      // 2. GEOJSON DATA
      // =========================
      const geojson = {
        type: "FeatureCollection",
        features: [
          { type: "Feature", geometry: { type: "Point", coordinates: [-3.1602672, 55.955865] }, properties: { name: "Meadowbank Exhibit" } },
          { type: "Feature", geometry: { type: "Point", coordinates: [-3.1606767, 55.9564659] }, properties: { name: "Wishaw Terrace Exhibit" } },
          { type: "Feature", geometry: { type: "Point", coordinates: [-3.2149218, 55.9418554] }, properties: { name: "Fountainbridge Exhibit" } },
          { type: "Feature", geometry: { type: "Point", coordinates: [-3.1782013, 55.9506139] }, properties: { name: "StreetReads Library (Simon Community Scotland)" } },
          ]
      };

      // =========================
      // 3. INIT MAP
      // =========================
      function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: 55.9533, lng: -3.1883 },
          zoom: 13,
          styles: mapStyle
        });

        // Add GeoJSON data
        map.data.addGeoJson(geojson);

        // CUSTOM MARKER STYLING
  map.data.setStyle((feature) => {

    const color = feature.getProperty("icon-color") || "#8B5CF6";

    return {
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: color,
        fillOpacity: 1,
        strokeWeight: 2,
        strokeColor: "#ffffff"
      }
    };
  });

        // Simple popup interaction
        const infoWindow = new google.maps.InfoWindow();

        map.data.addListener("click", (event) => {
          const name = event.feature.getProperty("name");

          infoWindow.setContent(`<strong>${name}</strong>`);
          infoWindow.setPosition(event.latLng);
          infoWindow.open(map);
        });
      }
    </script>

    <!-- =========================
         4. GOOGLE MAPS SCRIPT
         ========================= -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBo2chK0ZadTInhJH9f7dWZ1PmBQeRF5sY&callback=initMap"
    ></script>
  </body>
</html>
